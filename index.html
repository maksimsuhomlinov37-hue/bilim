<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimClass Pro — Dashboard</title>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --bg: #e0e5ec;
            --glass: rgba(255, 255, 255, 0.4);
            --text: #2d3436;
        }

        body {
            background-color: var(--bg);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            color: var(--text);
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            min-height: 100vh;
        }

        /* Glassmorphism Header */
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff;
            margin-bottom: 30px;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(76, 175, 80, 0.15);
            color: var(--primary-dark);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        #time-left {
            font-size: 48px;
            font-weight: 800;
            margin: 10px 0;
            letter-spacing: -1px;
            color: #1b1f23;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 1s linear;
        }

        /* Navigation */
        .days-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
        }
        .day-btn {
            flex: 1;
            border: none;
            padding: 12px 0;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: 6px 6px 12px #bec3c9, -6px -6px 12px #ffffff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #7f8c8d;
        }
        .day-btn.active {
            box-shadow: inset 4px 4px 8px #bec3c9, inset -4px -4px 8px #ffffff;
            color: var(--primary);
            transform: scale(0.95);
        }

        /* Lessons List */
        .lesson-item {
            background: var(--glass);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }
        .lesson-item.active {
            border-left: 5px solid var(--primary);
            background: rgba(255, 255, 255, 0.7);
        }
        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: 4px 4px 8px #bec3c9, -4px -4px 8px #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
        }
        .lesson-info { flex-grow: 1; }
        .lesson-name { display: block; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .lesson-time { font-size: 13px; color: #7f8c8d; font-weight: 500; }

        /* Log Section */
        .log-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.02);
            border-radius: 20px;
            border: 1px dashed #bec3c9;
        }
        .log-title { font-size: 14px; font-weight: 700; color: #95a5a6; margin-bottom: 10px; text-transform: uppercase; }
        .log-item { font-size: 13px; color: #7f8c8d; margin-bottom: 5px; display: flex; align-items: center; }
        .log-item::before { content: "•"; color: var(--primary); font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-card">
        <div class="status-badge" id="status-text">Инициализация...</div>
        <div id="time-left">00:00</div>
        <div id="advice-text" style="font-size: 13px; color: #7f8c8d;">Загружаем расписание...</div>
        <div class="progress-container">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="days-row">
        <button class="day-btn" onclick="setDay(1)">ПН</button>
        <button class="day-btn" onclick="setDay(2)">ВТ</button>
        <button class="day-btn" onclick="setDay(3)">СР</button>
        <button class="day-btn" onclick="setDay(4)">ЧТ</button>
        <button class="day-btn" onclick="setDay(5)">ПТ</button>
    </div>

    <div id="schedule-list"></div>

    <div class="log-section">
        <div class="log-title">BilimClass Log v2.0</div>
        <div class="log-item">Добавлен Glassmorphism дизайн</div>
        <div class="log-item">Оптимизирован движок таймера</div>
        <div class="log-item">Подготовка к GitHub Pages</div>
    </div>
</div>

<script>
    const CONFIG = {
        lessons: {
            1: [
                { name: "Математика", start: "12:55", end: "13:35", icon: "📐" },
                { name: "Русский язык", start: "13:40", end: "14:20", icon: "📚" },
                { name: "Физика", start: "14:30", end: "15:10", icon: "⚛️" },
                { name: "История", start: "15:25", end: "16:05", icon: "📜" },
                { name: "Физкультура", start: "16:15", end: "16:55", icon: "⚽" },
                { name: "Информатика", start: "17:00", end: "17:40", icon: "💻" }
            ],
            2: [
                { name: "Английский", start: "12:10", end: "12:50", icon: "🇬🇧" },
                { name: "География", start: "12:55", end: "13:35", icon: "🌍" },
                { name: "Алгебра", start: "14:30", end: "15:10", icon: "📝" },
                { name: "Биология", start: "15:25", end: "16:05", icon: "🌿" },
                { name: "Химия", start: "16:15", end: "16:55", icon: "🧪" }
            ],
            // Среда, Четверг, Пятница заполняются аналогично...
        }
    };

    let selectedDay = new Date().getDay();
    if (selectedDay === 0 || selectedDay === 6) selectedDay = 1;

    function toSeconds(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 3600 + m * 60;
    }

    function setDay(day) {
        selectedDay = day;
        render();
    }

    function render() {
        // Обновляем кнопки
        document.querySelectorAll('.day-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx + 1 === selectedDay);
        });

        // Отрисовка списка
        const list = document.getElementById('schedule-list');
        list.innerHTML = '';
        
        const now = new Date();
        const curSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        const isToday = now.getDay() === selectedDay;

        const dayLessons = CONFIG.lessons[selectedDay] || CONFIG.lessons[1];

        dayLessons.forEach(lesson => {
            const s = toSeconds(lesson.start);
            const e = toSeconds(lesson.end);
            const isActive = isToday && curSec >= s && curSec < e;

            list.innerHTML += `
                <div class="lesson-item ${isActive ? 'active' : ''}">
                    <div class="icon-box">${lesson.icon}</div>
                    <div class="lesson-info">
                        <span class="lesson-name">${lesson.name}</span>
                        <span class="lesson-time">${lesson.start} — ${lesson.end}</span>
                    </div>
                </div>
            `;
        });
    }

    function updateTick() {
        const now = new Date();
        const day = now.getDay();
        const curSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        
        let status = "Отдых";
        let timeStr = "--:--";
        let advice = "На сегодня уроков нет";
        let progress = 0;

        if (CONFIG.lessons[day]) {
            const today = CONFIG.lessons[day];
            let found = false;

            for (let i = 0; i < today.length; i++) {
                const s = toSeconds(today[i].start);
                const e = toSeconds(today[i].end);

                if (curSec < s) {
                    status = "Ожидание";
                    timeStr = formatDiff(s - curSec);
                    advice = `Следующий: ${today[i].name}`;
                    found = true;
                    break;
                } else if (curSec >= s && curSec < e) {
                    status = "Идет урок";
                    timeStr = formatDiff(e - curSec);
                    advice = `Сейчас: ${today[i].name}`;
                    progress = ((curSec - s) / (e - s)) * 100;
                    found = true;
                    break;
                }
            }
            if (!found && curSec > toSeconds(today[today.length-1].end)) {
                status = "Свобода!";
                advice = "Все уроки на сегодня завершены";
            }
        }

        document.getElementById('status-text').innerText = status;
        document.getElementById('time-left').innerText = timeStr;
        document.getElementById('advice-text').innerText = advice;
        document.getElementById('progress-fill').style.width = progress + "%";
        
        if (day === selectedDay) render(); // Перерисовываем список только если смотрим текущий день
    }

    function formatDiff(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    setInterval(updateTick, 1000);
    setDay(selectedDay);
    updateTick();
</script>

</body>
</html>
