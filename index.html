<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>GEOMETRIDESH X</title>

<style>
/* =========================================================
GEOMETRIDESH X
SUPER ULTRA EDITION 😎
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
overflow:hidden;
background:#050816;
font-family:Arial,sans-serif;
touch-action:none;
height:100%;
}

/* ================= LOADER ================= */

.loader{
position:fixed;
inset:0;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at top,
#294bb1 0%,
#0a1230 45%,
#04070f 100%);

animation:fadeOut 1s ease forwards;
animation-delay:2.5s;
}

.loaderLogo{
font-size:64px;
font-weight:900;
letter-spacing:5px;
color:white;

text-shadow:
0 0 25px #62d3ff,
0 0 60px #5468ff;

animation:pulse 2s infinite;
}

.loadingBar{
width:300px;
height:18px;
margin-top:30px;
border-radius:999px;
overflow:hidden;
background:rgba(255,255,255,.08);
}

.loadingFill{
height:100%;
width:0%;

background:
linear-gradient(90deg,
#58d8ff,
#7168ff);

animation:loading 2.2s forwards;
}

@keyframes loading{
100%{
width:100%;
}
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}

@keyframes fadeOut{
100%{
opacity:0;
visibility:hidden;
}
}

/* ================= GAME ================= */

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* ================= MENUS ================= */

.screen{
position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at top,
#2748aa 0%,
#0a1231 45%,
#050814 100%);

z-index:20;

animation:menuShow 1s ease;
}

@keyframes menuShow{
from{
opacity:0;
transform:scale(1.1);
}
to{
opacity:1;
transform:scale(1);
}
}

.logo{
font-size:68px;
font-weight:900;
letter-spacing:4px;
color:white;
margin-bottom:40px;

text-shadow:
0 0 25px #62d3ff,
0 0 60px #5468ff;

animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-12px);
}
}

.menuButtons{
display:flex;
flex-direction:column;
gap:18px;
width:min(360px,90%);
}

.btn{
padding:20px;
border:none;
border-radius:24px;
font-size:22px;
font-weight:900;
color:white;
cursor:pointer;

background:
linear-gradient(135deg,
rgba(255,255,255,.16),
rgba(255,255,255,.05));

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.14);

box-shadow:
0 0 30px rgba(80,140,255,.25),
inset 0 0 20px rgba(255,255,255,.05);

transition:.25s;
}

.btn:hover{
transform:translateY(-4px);
}

.btn:active{
transform:scale(.96);
}

/* ================= LEVELS ================= */

.levels{
display:none;
}

.levelGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:18px;
width:min(760px,92%);
}

.level{
height:130px;
border-radius:26px;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

font-weight:900;
font-size:24px;
color:white;

background:
linear-gradient(135deg,
rgba(255,255,255,.14),
rgba(255,255,255,.06));

border:1px solid rgba(255,255,255,.14);

box-shadow:
0 0 25px rgba(90,130,255,.2);

cursor:pointer;
transition:.25s;

position:relative;
overflow:hidden;
}

.level:hover{
transform:translateY(-6px);
}

.level::before{
content:"";
position:absolute;
inset:-50%;

background:
linear-gradient(
45deg,
transparent,
rgba(255,255,255,.15),
transparent);

transform:rotate(25deg);

animation:shine 5s linear infinite;
}

@keyframes shine{
100%{
transform:
translateX(500px)
rotate(25deg);
}
}

.level span{
font-size:14px;
opacity:.7;
margin-top:8px;
}

.completed{
outline:3px solid #6bff95;
box-shadow:
0 0 35px rgba(80,255,120,.5);
}

/* ================= HUD ================= */

.topUI{
position:fixed;
top:0;
left:0;
width:100%;
padding:14px;
display:none;
justify-content:space-between;
align-items:center;
z-index:10;
}

.progressBox{
width:220px;
height:20px;
border-radius:999px;
overflow:hidden;
background:rgba(255,255,255,.1);
}

.progress{
height:100%;
width:0%;

background:
linear-gradient(90deg,
#57d8ff,
#7166ff);

box-shadow:0 0 20px #53c1ff;

transition:.1s;
}

.pauseBtn{
padding:12px 18px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:900;
color:white;

background:
linear-gradient(135deg,
#496bff,
#7d61ff);
}

/* ================= MOBILE ================= */

.jumpBtn{
position:fixed;
right:20px;
bottom:20px;

width:96px;
height:96px;

border:none;
border-radius:50%;

display:none;

font-size:24px;
font-weight:900;
color:white;

background:
radial-gradient(circle at top left,
#9be5ff,
#5466ff);

box-shadow:
0 0 35px rgba(90,160,255,.7);

z-index:12;
}

.jumpBtn:active{
transform:scale(.92);
}

/* ================= POPUP ================= */

.popup{
position:fixed;
top:50%;
left:50%;

transform:
translate(-50%,-50%)
scale(.7);

padding:30px 45px;
border-radius:30px;

background:
linear-gradient(135deg,
rgba(255,255,255,.18),
rgba(255,255,255,.08));

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,.14);

font-size:42px;
font-weight:900;
color:white;

opacity:0;
pointer-events:none;

z-index:100;

transition:.4s;

text-align:center;

text-shadow:
0 0 20px #68c5ff;
}

.popup.show{
opacity:1;

transform:
translate(-50%,-50%)
scale(1);
}

/* ================= MOBILE ================= */

@media(max-width:850px){

.levelGrid{
grid-template-columns:1fr;
}

.logo{
font-size:40px;
}

.jumpBtn{
width:84px;
height:84px;
font-size:20px;
}
}
</style>
</head>

<body>

<!-- ================= LOADER ================= -->

<div class="loader">

<div class="loaderLogo">
GEOMETRIDESH X
</div>

<div class="loadingBar">
<div class="loadingFill"></div>
</div>

</div>

<canvas id="game"></canvas>

<!-- ================= MENU ================= -->

<div class="screen"
id="mainMenu">

<div class="logo">
GEOMETRIDESH
</div>

<div class="menuButtons">

<button class="btn"
onclick="openLevels()">
▶ ИГРАТЬ
</button>

<button class="btn"
onclick="openHowTo()">
❓ КАК ИГРАТЬ
</button>

<button class="btn"
onclick="resetProgress()">
🗑 СБРОС ПРОГРЕССА
</button>

</div>

</div>

<!-- ================= HOW TO ================= -->

<div class="screen"
id="howTo"
style="display:none;">

<div class="logo">
КАК ИГРАТЬ
</div>

<div style="
max-width:700px;
padding:20px;
text-align:center;
line-height:1.8;
color:white;
font-size:20px;
opacity:.9;
">

SPACE / КЛИК / ▲ = ПРЫЖОК<br><br>

Esc = выйти ⌨<br><br>

Проходи уровни и получай достижения 🏆

</div>

<button class="btn"
style="width:min(300px,90%);"
onclick="backMenu()">
⬅ НАЗАД
</button>

</div>

<!-- ================= LEVELS ================= -->

<div class="screen levels"
id="levels">

<div class="logo">
УРОВНИ
</div>

<div class="levelGrid"
id="levelGrid">

</div>

<br>

<button class="btn"
style="width:min(320px,90%);"
onclick="backMenu()">
⬅ НАЗАД
</button>

</div>

<!-- ================= HUD ================= -->

<div class="topUI"
id="topUI">

<div class="progressBox">
<div class="progress"
id="progress"></div>
</div>

<button class="pauseBtn"
onclick="exitToMenu()">
🏠
</button>

</div>

<button class="jumpBtn"
id="jumpBtn">
▲
</button>

<div class="popup"
id="popup">
МОЛОДЕЦ 😎
</div>

<script>
/* =========================================================
GEOMETRIDESH X ENGINE
========================================================= */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width = innerWidth;
canvas.height = innerHeight;
}

resize();

addEventListener("resize",resize);

/* ================= AUDIO ================= */

const audioCtx =
new(window.AudioContext||
window.webkitAudioContext)();

function sound(freq,time,type="square"){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.type = type;
osc.frequency.value = freq;

gain.gain.value = .03;

osc.start();

osc.stop(audioCtx.currentTime + time);
}

/* ================= DATA ================= */

const TOTAL_LEVELS = 9;

let currentLevel = 1;
let cameraX = 0;
let gameStarted = false;
let levelLength = 5000;

const completedLevels =
JSON.parse(
localStorage.getItem(
"geomCompleted"
) || "[]"
);

const player = {

x:170,
y:0,

size:52,

velY:0,

rotation:0,

gravity:.82,

jump:-15,

grounded:false
};

function groundY(){

return canvas.height - 170;
}

const spikes = [];
const blocks = [];
const particles = [];

/* ================= LOCAL STORAGE ================= */

function saveProgress(){

localStorage.setItem(
"geomCompleted",
JSON.stringify(completedLevels)
);
}

function resetProgress(){

localStorage.removeItem(
"geomCompleted"
);

location.reload();
}

/* ================= LEVEL UI ================= */

function buildLevels(){

const grid =
document.getElementById("levelGrid");

grid.innerHTML = "";

for(let i=1;i<=TOTAL_LEVELS;i++){

const div =
document.createElement("div");

div.className =
"level";

if(completedLevels.includes(i)){

div.classList.add(
"completed"
);
}

div.innerHTML = `
LEVEL ${i}
<span>
${[
"EASY",
"NORMAL",
"HARD",
"INSANE",
"DEMON",
"NEON",
"HELL",
"MASTER",
"FINAL"
][i-1]}
</span>
`;

div.onclick = ()=>{

startGame(i);
};

grid.appendChild(div);
}
}

buildLevels();

/* ================= PARTICLES ================= */

function createParticles(x,y,color){

for(let i=0;i<18;i++){

particles.push({

x,
y,

vx:(Math.random()-.5)*7,
vy:(Math.random()-.5)*7,

life:60,

color
});
}
}

function updateParticles(){

for(let i=particles.length-1;i>=0;i--){

const p = particles[i];

p.x += p.vx;
p.y += p.vy;

p.life--;

ctx.globalAlpha =
p.life/60;

ctx.fillStyle =
p.color;

ctx.fillRect(
p.x,
p.y,
6,
6
);

ctx.globalAlpha = 1;

if(p.life <= 0){

particles.splice(i,1);
}
}
}

/* ================= LEVEL GENERATOR ================= */

function generateLevel(level){

spikes.length = 0;
blocks.length = 0;

let x = 100;

for(let i=0;i<18+level*2;i++){

const h =
groundY() -
80 -
Math.sin(i*.8)*120;

blocks.push({

x,
y:h,
w:180,
h:40
});

if(i > 2){

spikes.push({

x:x+230,
y:groundY()-45,
size:45
});
}

x +=
320 -
(level*8);
}

levelLength = x + 600;
}

/* ================= START ================= */

function startGame(level){

currentLevel = level;

document.getElementById("mainMenu")
.style.display="none";

document.getElementById("levels")
.style.display="none";

document.getElementById("topUI")
.style.display="flex";

document.getElementById("jumpBtn")
.style.display="block";

cameraX = 0;

player.y = groundY()-50;
player.velY = 0;
player.rotation = 0;

gameStarted = true;

generateLevel(level);

sound(420,.08);
}

/* ================= MENUS ================= */

function openLevels(){

sound(550,.05);

document.getElementById("mainMenu")
.style.display="none";

document.getElementById("levels")
.style.display="flex";
}

function openHowTo(){

document.getElementById("mainMenu")
.style.display="none";

document.getElementById("howTo")
.style.display="flex";
}

function backMenu(){

document.getElementById("levels")
.style.display="none";

document.getElementById("howTo")
.style.display="none";

document.getElementById("mainMenu")
.style.display="flex";
}

function exitToMenu(){

gameStarted = false;

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";

document.getElementById("mainMenu")
.style.display="flex";
}

/* ================= INPUT ================= */

function jump(){

if(!gameStarted) return;

if(player.grounded){

player.velY = player.jump;
player.grounded = false;

createParticles(
player.x,
player.y,
"#6ddcff"
);

sound(700,.05,"triangle");
}
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
jump();
}

if(e.code==="Escape"){
exitToMenu();
}
});

document.addEventListener("mousedown",jump);
document.addEventListener("touchstart",jump);

document.getElementById("jumpBtn")
.addEventListener("touchstart",(e)=>{

e.preventDefault();

jump();
});

/* ================= POPUP ================= */

function showPopup(text){

const popup =
document.getElementById("popup");

popup.innerHTML = text;

popup.classList.add("show");

setTimeout(()=>{

popup.classList.remove("show");

},2600);
}

/* ================= DRAW ================= */

function drawBackground(){

const grad =
ctx.createLinearGradient(
0,0,0,canvas.height);

grad.addColorStop(0,"#18306d");
grad.addColorStop(.5,"#0b1638");
grad.addColorStop(1,"#050814");

ctx.fillStyle = grad;

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

/* stars */

for(let i=0;i<80;i++){

ctx.fillStyle =
"rgba(255,255,255,.25)";

ctx.fillRect(
(i*180-cameraX*.1)%16000,
100+(i%12)*50,
2,
2
);
}

/* glow towers */

for(let i=0;i<40;i++){

let x =
((i*350)-cameraX*.2)%16000;

ctx.fillStyle =
"rgba(120,170,255,.08)";

ctx.fillRect(
x,
100,
120,
600
);
}
}

function drawGround(){

ctx.fillStyle="#091126";

ctx.fillRect(
0,
groundY(),
canvas.width,
400
);
}

function drawPlayer(){

ctx.save();

ctx.translate(
player.x,
player.y
);

ctx.rotate(player.rotation);

ctx.shadowBlur = 25;
ctx.shadowColor = "#62c8ff";

const g =
ctx.createLinearGradient(
-40,-40,
40,40
);

g.addColorStop(0,"#6cf1ff");
g.addColorStop(1,"#6865ff");

ctx.fillStyle = g;

ctx.fillRect(
-player.size/2,
-player.size/2,
player.size,
player.size
);

ctx.restore();
}

function drawBlocks(){

blocks.forEach(b=>{

const x = b.x - cameraX;

ctx.shadowBlur = 18;
ctx.shadowColor = "#55a8ff";

const g =
ctx.createLinearGradient(
x,b.y,
x,b.y+b.h
);

g.addColorStop(0,"#69d6ff");
g.addColorStop(1,"#4364ff");

ctx.fillStyle = g;

ctx.fillRect(
x,
b.y,
b.w,
b.h
);
});
}

function drawSpikes(){

spikes.forEach(s=>{

const x = s.x - cameraX;

ctx.beginPath();

ctx.moveTo(
x,
s.y+s.size
);

ctx.lineTo(
x+s.size/2,
s.y
);

ctx.lineTo(
x+s.size,
s.y+s.size
);

ctx.closePath();

ctx.shadowBlur = 20;
ctx.shadowColor = "#ff4673";

const g =
ctx.createLinearGradient(
x,s.y,
x,s.y+s.size
);

g.addColorStop(0,"#ff8eb1");
g.addColorStop(1,"#ff3d6d");

ctx.fillStyle = g;

ctx.fill();
});
}

/* ================= UPDATE ================= */

function update(){

if(!gameStarted) return;

cameraX +=
3.2 + currentLevel*.45;

player.velY +=
player.gravity;

player.y +=
player.velY;

player.grounded = false;

/* ground */

if(
player.y >=
groundY()-player.size/2
){

player.y =
groundY()-player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}

/* blocks */

blocks.forEach(b=>{

const bx = b.x - cameraX;

if(
player.x + player.size/2 > bx &&
player.x - player.size/2 < bx+b.w &&
player.y + player.size/2 > b.y &&
player.y + player.size/2 < b.y+25 &&
player.velY >= 0
){

player.y =
b.y - player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}
});

/* rotate */

if(!player.grounded){

player.rotation += .08;
}

/* spikes */

spikes.forEach(s=>{

const x = s.x - cameraX;

if(
player.x + player.size/2 > x &&
player.x - player.size/2 < x+s.size &&
player.y + player.size/2 > s.y
){

createParticles(
player.x,
player.y,
"#ff4f7f"
);

sound(120,.15,"sawtooth");

startGame(currentLevel);
}
});

/* win */

if(cameraX >= levelLength){

gameStarted = false;

if(
!completedLevels.includes(
currentLevel
)
){

completedLevels.push(
currentLevel
);

saveProgress();

buildLevels();
}

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";

document.getElementById("levels")
.style.display="flex";

showPopup(
[
"МОЛОДЕЦ 😎",
"ХОРОШ 🔥",
"МАШИНА ⚡",
"БЕЗУМИЕ 👹",
"ДЕМОН 😈",
"НЕОН 🌌",
"HELL MODE 🔥",
"MASTER 👑",
"ФИНАЛ 🏆"
][currentLevel-1]
);

if(completedLevels.length
=== TOTAL_LEVELS){

setTimeout(()=>{

showPopup(
"🏆 НАСТОЯЩИЙ ДЕМОН 🏆"
);

},1200);
}

sound(950,.2,"triangle");
}

/* progress */

const progress =
Math.min(
(cameraX/levelLength)*100,
100
);

document.getElementById("progress")
.style.width =
progress + "%";
}

/* ================= LOOP ================= */

function loop(){

drawBackground();

drawGround();

update();

drawBlocks();

drawSpikes();

drawPlayer();

updateParticles();

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
