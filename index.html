<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>GEOMETRIDESH NIGHTMARE</title>

<style>

/* =========================================================
GEOMETRIDESH NIGHTMARE
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* ================= MENU ================= */

.menu{
position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at top,
#320000 0%,
#120000 45%,
#000 100%);

z-index:50;
}

.logo{
font-size:72px;
font-weight:900;

color:white;

letter-spacing:6px;

text-shadow:
0 0 25px red,
0 0 80px crimson;

animation:pulse 2s infinite;
}

@keyframes pulse{

50%{
transform:scale(1.04);
}
}

.menuButtons{

margin-top:40px;

display:flex;
flex-direction:column;

gap:18px;

width:min(360px,90%);
}

.btn{

padding:20px;

border:none;
border-radius:24px;

font-size:22px;
font-weight:900;

color:white;

cursor:pointer;

background:
linear-gradient(135deg,
rgba(255,0,0,.24),
rgba(255,255,255,.05));

border:1px solid rgba(255,255,255,.1);

backdrop-filter:blur(12px);

box-shadow:
0 0 35px rgba(255,0,0,.25);

transition:.2s;
}

.btn:hover{
transform:translateY(-5px);
}

/* ================= LEVELS ================= */

.levels{
display:none;
}

.levelGrid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:18px;

width:min(900px,92%);

margin-top:35px;
}

.level{

height:150px;

border-radius:28px;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

font-size:28px;
font-weight:900;

color:white;

cursor:pointer;

background:
linear-gradient(135deg,
rgba(255,0,0,.22),
rgba(255,255,255,.04));

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 30px rgba(255,0,0,.22);

transition:.25s;
}

.level:hover{
transform:translateY(-7px);
}

.level span{

margin-top:8px;

font-size:14px;

opacity:.7;
}

/* ================= HUD ================= */

.topUI{
position:fixed;
top:0;
left:0;

width:100%;

padding:14px;

display:none;
justify-content:space-between;
align-items:center;

z-index:20;
}

.progressBox{

width:280px;
height:22px;

border-radius:999px;

overflow:hidden;

background:rgba(255,255,255,.08);
}

.progress{

height:100%;
width:0%;

background:
linear-gradient(90deg,
#ff0000,
orange);

box-shadow:
0 0 30px red;
}

.pause{

padding:12px 18px;

border:none;
border-radius:16px;

font-size:18px;
font-weight:900;

color:white;

background:
linear-gradient(135deg,
#900000,
#ff2222);
}

/* ================= MOBILE ================= */

.jumpBtn{

position:fixed;

right:20px;
bottom:20px;

width:100px;
height:100px;

display:none;

border:none;
border-radius:50%;

font-size:26px;
font-weight:900;

color:white;

background:
radial-gradient(circle at top left,
#ff6666,
#700000);

box-shadow:
0 0 40px red;

z-index:25;
}

/* ================= EYES ================= */

.eye{

position:fixed;

width:150px;
height:150px;

border-radius:50%;

background:
radial-gradient(circle,
#ff0000 0%,
#4d0000 40%,
transparent 70%);

box-shadow:
0 0 45px red;

pointer-events:none;

z-index:4;
}

.pupil{

position:absolute;

width:40px;
height:40px;

border-radius:50%;

background:black;

top:50%;
left:50%;

transform:
translate(-50%,-50%);
}

/* ================= SCREAMER ================= */

.screamer{

position:fixed;
inset:0;

display:none;

justify-content:center;
align-items:center;

background:
rgba(0,0,0,.95);

z-index:999;
}

.screamer img{

width:min(700px,92vw);

border-radius:20px;

box-shadow:
0 0 70px red;

animation:
shake .07s infinite,
zoom .35s ease-out;
}

@keyframes shake{

50%{
transform:
translate(10px,-10px)
rotate(2deg);
}
}

@keyframes zoom{

from{
transform:scale(.3);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}
}

/* ================= FLASH ================= */

.flash{

position:fixed;
inset:0;

background:white;

opacity:0;

pointer-events:none;

z-index:200;

transition:.2s;
}

/* ================= WARNING ================= */

.warning{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

font-size:90px;
font-weight:900;

color:red;

opacity:0;

z-index:120;

text-shadow:
0 0 40px red;

transition:.2s;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.logo{
font-size:42px;
}

.levelGrid{
grid-template-columns:1fr;
}

.eye{
width:90px;
height:90px;
}

.jumpBtn{
width:82px;
height:82px;
font-size:22px;
}

.warning{
font-size:42px;
}
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- ================= MENU ================= -->

<div class="menu"
id="menu">

<div class="logo">
GEOMETRIDESH
</div>

<div class="menuButtons">

<button class="btn"
onclick="openLevels()">
▶ ИГРАТЬ
</button>

<button class="btn"
onclick="alert('SPACE / КЛИК = ПРЫЖОК')">
❓ КАК ИГРАТЬ
</button>

</div>

</div>

<!-- ================= LEVELS ================= -->

<div class="menu levels"
id="levels">

<div class="logo">
NIGHTMARE LEVELS
</div>

<div class="levelGrid">

<div class="level"
onclick="startGame(1)">
LEVEL 1
<span>BEGINNER</span>
</div>

<div class="level"
onclick="startGame(2)">
LEVEL 2
<span>STAIRS</span>
</div>

<div class="level"
onclick="startGame(3)">
LEVEL 3
<span>SPEED</span>
</div>

<div class="level"
onclick="startGame(4)">
LEVEL 4
<span>SHIP</span>
</div>

<div class="level"
onclick="startGame(5)">
LEVEL 5
<span>HELL</span>
</div>

<div class="level"
onclick="startGame(6)">
LEVEL 6
<span>NIGHTMARE</span>
</div>

</div>

</div>

<!-- ================= HUD ================= -->

<div class="topUI"
id="topUI">

<div class="progressBox">
<div class="progress"
id="progress"></div>
</div>

<button class="pause"
onclick="exitMenu()">
🏠
</button>

</div>

<button class="jumpBtn"
id="jumpBtn">
▲
</button>

<!-- ================= EYES ================= -->

<div class="eye"
id="eye1"
style="top:8%;left:8%;">

<div class="pupil"></div>

</div>

<div class="eye"
id="eye2"
style="top:15%;right:10%;">

<div class="pupil"></div>

</div>

<div class="eye"
id="eye3"
style="bottom:10%;left:12%;">

<div class="pupil"></div>

</div>

<div class="eye"
id="eye4"
style="bottom:8%;right:12%;">

<div class="pupil"></div>

</div>

<!-- ================= SCREAMER ================= -->

<div class="screamer"
id="screamer">

<img
id="screamerImg"
src="https://images.unsplash.com/photo-1507149833265-60c372daea22?q=80&w=1200&auto=format&fit=crop"
/>

</div>

<div class="flash"
id="flash"></div>

<div class="warning"
id="warning">
RUN
</div>

<script>

/* =========================================================
ENGINE
========================================================= */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width = innerWidth;
canvas.height = innerHeight;
}

resize();

addEventListener("resize",resize);

/* ================= AUDIO ================= */

const audioCtx =
new(window.AudioContext||
window.webkitAudioContext)();

function bass(freq,time,type="sawtooth",volume=.05){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value = freq;
osc.type = type;

gain.gain.value = volume;

osc.start();

osc.stop(audioCtx.currentTime + time);
}

let bassLoop;

function startMusic(){

clearInterval(bassLoop);

bassLoop = setInterval(()=>{

bass(40,.25,"square",.08);

setTimeout(()=>{
bass(28,.2,"sawtooth",.09);
},120);

setTimeout(()=>{
bass(85,.15,"triangle",.04);
},240);

},500);
}

/* ================= GAME ================= */

let gameStarted = false;

let cameraX = 0;
let levelLength = 8000;
let speed = 5;

const player = {

x:180,
y:0,

size:52,

velY:0,

gravity:.72,

jump:-18,

rotation:0,

grounded:false
};

const spikes = [];
const blocks = [];

function groundY(){

return canvas.height - 170;
}

/* ================= LEVELS ================= */

function generateLevel(level){

spikes.length = 0;
blocks.length = 0;

if(level===1){

speed = 4;

blocks.push({
x:0,
y:groundY()-80,
w:3000,
h:40
});

for(let i=0;i<8;i++){

spikes.push({

x:1200+i*300,
y:groundY()-45,
size:45
});
}

levelLength = 4000;
}

if(level===2){

speed = 4.5;

blocks.push({
x:0,
y:groundY()-80,
w:1000,
h:40
});

for(let i=0;i<8;i++){

blocks.push({

x:1400+i*250,

y:groundY()-120-(i%2)*100,

w:180,
h:40
});
}

levelLength = 5000;
}

if(level===3){

speed = 6;

blocks.push({
x:0,
y:groundY()-80,
w:1500,
h:40
});

for(let i=0;i<16;i++){

spikes.push({

x:1800+i*170,
y:groundY()-45,
size:50
});
}

levelLength = 5200;
}

if(level===4){

speed = 7;

for(let i=0;i<16;i++){

blocks.push({

x:800+i*250,

y:groundY()-120-(i%3)*90,

w:160,
h:40
});
}

levelLength = 6200;
}

if(level===5){

speed = 8;

for(let i=0;i<28;i++){

const up =
i%2===0;

spikes.push({

x:1000+i*140,

y:up
? groundY()-320
: groundY()-45,

size:65
});
}

levelLength = 7000;
}

if(level===6){

speed = 9;

for(let i=0;i<40;i++){

spikes.push({

x:1200+i*120,
y:groundY()-45,
size:70
});
}

for(let i=0;i<15;i++){

blocks.push({

x:2500+i*220,

y:groundY()-160-(i%2)*140,

w:170,
h:40
});
}

levelLength = 9000;
}
}

/* ================= START ================= */

function startGame(level){

cameraX = 0;

player.y =
groundY()-50;

player.velY = 0;

player.rotation = 0;

gameStarted = true;

document.getElementById("levels")
.style.display="none";

document.getElementById("topUI")
.style.display="flex";

document.getElementById("jumpBtn")
.style.display="block";

generateLevel(level);

startMusic();
}

function openLevels(){

document.getElementById("menu")
.style.display="none";

document.getElementById("levels")
.style.display="flex";
}

function exitMenu(){

gameStarted = false;

document.getElementById("menu")
.style.display="flex";

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";
}

/* ================= INPUT ================= */

function jump(){

if(!gameStarted) return;

if(player.grounded){

player.velY =
player.jump;

player.grounded = false;

bass(120,.05);
}
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
jump();
}

if(e.code==="Escape"){
exitMenu();
}
});

document.addEventListener("mousedown",jump);
document.addEventListener("touchstart",jump);

/* ================= SCREAMERS ================= */

const screamerImages = [

"https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop",

"https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=1200&auto=format&fit=crop",

"https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?q=80&w=1200&auto=format&fit=crop"

];

function triggerScreamer(){

const screamer =
document.getElementById(
"screamer"
);

document.getElementById(
"screamerImg"
).src =

screamerImages[
Math.floor(
Math.random()*screamerImages.length
)];

screamer.style.display =
"flex";

document.getElementById(
"flash"
).style.opacity = .8;

bass(22,.5,"sawtooth",.12);

setTimeout(()=>{

document.getElementById(
"flash"
).style.opacity = 0;

},100);

setTimeout(()=>{

screamer.style.display =
"none";

},280);
}

/* ================= WARNING ================= */

function warning(){

const w =
document.getElementById(
"warning"
);

w.style.opacity = 1;

setTimeout(()=>{

w.style.opacity = 0;

},600);
}

/* ================= EYES ================= */

function updateEyes(){

const eyes =
document.querySelectorAll(".eye");

eyes.forEach((eye,index)=>{

const offsetX =
Math.sin(Date.now()*.001+index)*25;

const offsetY =
Math.cos(Date.now()*.0014+index)*20;

eye.style.transform =
`translate(${offsetX}px,${offsetY}px)`;
});
}

/* ================= DRAW ================= */

function drawBackground(){

const grad =
ctx.createLinearGradient(
0,0,0,canvas.height
);

grad.addColorStop(0,"#280000");
grad.addColorStop(.5,"#100000");
grad.addColorStop(1,"#000");

ctx.fillStyle = grad;

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

for(let i=0;i<100;i++){

ctx.fillStyle =
"rgba(255,0,0,.22)";

ctx.fillRect(
(i*180-cameraX*.2)%18000,
80+(i%10)*60,
2,
2
);
}
}

function drawGround(){

ctx.fillStyle="#180000";

ctx.fillRect(
0,
groundY(),
canvas.width,
400
);
}

function drawPlayer(){

ctx.save();

ctx.translate(
player.x,
player.y
);

ctx.rotate(player.rotation);

ctx.shadowBlur = 30;
ctx.shadowColor = "red";

ctx.fillStyle = "#ff4444";

ctx.fillRect(
-player.size/2,
-player.size/2,
player.size,
player.size
);

ctx.restore();
}

function drawBlocks(){

blocks.forEach(b=>{

const x = b.x - cameraX;

ctx.fillStyle = "#a00000";

ctx.shadowBlur = 20;
ctx.shadowColor = "red";

ctx.fillRect(
x,
b.y,
b.w,
b.h
);
});
}

function drawSpikes(){

spikes.forEach(s=>{

const x = s.x - cameraX;

ctx.beginPath();

ctx.moveTo(
x,
s.y+s.size
);

ctx.lineTo(
x+s.size/2,
s.y
);

ctx.lineTo(
x+s.size,
s.y+s.size
);

ctx.closePath();

ctx.fillStyle = "#ff2222";

ctx.shadowBlur = 25;
ctx.shadowColor = "red";

ctx.fill();
});
}

/* ================= UPDATE ================= */

function update(){

if(!gameStarted) return;

cameraX += speed;

player.velY +=
player.gravity;

player.y +=
player.velY;

player.grounded = false;

/* ===== GROUND ===== */

if(
player.y >=
groundY()-player.size/2
){

player.y =
groundY()-player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}

/* ===== BLOCKS ===== */

blocks.forEach(b=>{

const bx = b.x - cameraX;

if(
player.x + player.size/2 > bx &&
player.x - player.size/2 < bx+b.w &&
player.y + player.size/2 > b.y &&
player.y + player.size/2 < b.y+30 &&
player.velY >= 0
){

player.y =
b.y-player.size/2;

player.velY = 0;

player.grounded = true;
}
});

/* ===== ROTATION ===== */

if(!player.grounded){

player.rotation += .08;
}

/* ===== SPIKES ===== */

spikes.forEach(s=>{

const x = s.x - cameraX;

if(
player.x + player.size/2 > x+5 &&
player.x - player.size/2 < x+s.size-5 &&
player.y + player.size/2 > s.y+10 &&
player.y - player.size/2 < s.y+s.size
){

triggerScreamer();

startGame(1);
}
});

/* ===== RANDOM EVENTS ===== */

if(Math.random()<.002){

triggerScreamer();
}

if(Math.random()<.0015){

warning();
}

/* ===== PROGRESS ===== */

document.getElementById(
"progress"
).style.width =

(cameraX/levelLength)*100
+ "%";
}

/* ================= LOOP ================= */

function loop(){

drawBackground();

drawGround();

update();

drawBlocks();

drawSpikes();

drawPlayer();

updateEyes();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
