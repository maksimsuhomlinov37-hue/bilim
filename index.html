<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BilimClass</title
  <link rel="stylesheet" href="Bilim.css">
  <script src="Bilim.js"></script>

  <!-- Подключение стилей -->
  <link rel="stylesheet" href="Bilim.css">

  <!-- Шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Фоновые световые элементы -->
  <div class="bg-circle circle1"></div>
  <div class="bg-circle circle2"></div>
  <div class="bg-circle circle3"></div>

  <!-- Контейнер -->
  <main class="container">

    <!-- Экран входа -->
    <section class="glass-card auth-card" id="loginScreen">

      <div class="logo">
        <span class="logo-green">Bilim</span>
        <span class="logo-dark">Class</span>
      </div>

      <p class="subtitle">
        Современная образовательная платформа
      </p>

      <!-- Поле логина -->
      <div class="input-group">
        <label>Логин</label>
        <input
          type="text"
          id="loginInput"
          placeholder="Введите логин"
        >
      </div>

      <!-- Поле пароля -->
      <div class="input-group">
        <label>Пароль</label>
        <input
          type="password"
          id="passwordInput"
          placeholder="Введите пароль"
        >
      </div>

      <!-- Кнопка входа -->
      <button class="main-btn" id="loginBtn">
        Войти
      </button>

    </section>

    <!-- Главный экран -->
    <section class="glass-card dashboard hidden" id="dashboard">

      <div class="top-bar">
        <div>
          <h1>Добро пожаловать 👋</h1>
          <p id="userInfo">Пользователь</p>
        </div>

        <button class="logout-btn" id="logoutBtn">
          Выйти
        </button>
      </div>

      <!-- Карточки -->
      <div class="cards">

        <div class="mini-card">
          <h3>📚 Предметы</h3>
          <p>Математика, История, Физика</p>
        </div>

        <div class="mini-card">
          <h3>📝 Домашнее задание</h3>
          <p>3 активных задания</p>
        </div>

        <div class="mini-card">
          <h3>⭐ Успеваемость</h3>
          <p>Средний балл: 4.9</p>
        </div>

      </div>

    </section>

  </main>

  <!-- Подключение JS -->
  <script src="Bilim.js"></script>

</body>
</html>
