<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>GEOMETRIDESH HORROR</title>

<style>

/* =========================================================
GEOMETRIDESH HORROR
FULL MOBILE + PC + TABLET
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
touch-action:none;
}

/* ================= CANVAS ================= */

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* ================= MENU ================= */

.menu{
position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at top,
#330000 0%,
#110000 40%,
#000 100%);

z-index:50;
}

.logo{

font-size:72px;
font-weight:900;

letter-spacing:8px;

color:white;

text-shadow:
0 0 20px red,
0 0 60px crimson;

animation:logoPulse 2s infinite;
}

@keyframes logoPulse{

50%{
transform:scale(1.03);
}
}

.buttons{

margin-top:40px;

display:flex;
flex-direction:column;

gap:20px;

width:min(360px,90%);
}

.btn{

padding:20px;

border:none;
border-radius:24px;

font-size:22px;
font-weight:900;

color:white;

background:
linear-gradient(135deg,
rgba(255,0,0,.25),
rgba(255,255,255,.05));

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 40px rgba(255,0,0,.25);

backdrop-filter:blur(12px);

cursor:pointer;

transition:.2s;
}

.btn:hover{
transform:translateY(-5px);
}

/* ================= HUD ================= */

.topUI{

position:fixed;
top:0;
left:0;

width:100%;

padding:14px;

display:none;
justify-content:space-between;
align-items:center;

z-index:20;
}

.progressBox{

width:320px;
height:24px;

background:
rgba(255,255,255,.08);

border-radius:999px;

overflow:hidden;
}

.progress{

height:100%;
width:0%;

background:
linear-gradient(90deg,
#ff0000,
orange);

box-shadow:
0 0 30px red;
}

.pause{

padding:12px 18px;

border:none;
border-radius:16px;

font-size:18px;
font-weight:900;

color:white;

background:
linear-gradient(135deg,
#8a0000,
#ff2222);
}

/* ================= MOBILE BUTTON ================= */

.jumpBtn{

position:fixed;

right:20px;
bottom:20px;

width:100px;
height:100px;

display:none;

border:none;
border-radius:50%;

font-size:32px;
font-weight:900;

color:white;

background:
radial-gradient(circle at top left,
#ff6666,
#650000);

box-shadow:
0 0 50px red;

z-index:25;
}

/* ================= EYES ================= */

.eye{

position:fixed;

width:170px;
height:170px;

border-radius:50%;

background:
radial-gradient(circle,
#ff0000 0%,
#5c0000 45%,
transparent 70%);

box-shadow:
0 0 45px red;

pointer-events:none;

z-index:5;
}

.pupil{

position:absolute;

width:42px;
height:42px;

border-radius:50%;

background:black;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

transition:.08s linear;
}

/* ================= FLASH ================= */

.flash{

position:fixed;
inset:0;

background:white;

opacity:0;

pointer-events:none;

z-index:999;

transition:.1s;
}

/* ================= WARNING ================= */

.warning{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

font-size:90px;
font-weight:900;

color:red;

opacity:0;

z-index:100;

text-shadow:
0 0 35px red;

transition:.2s;
}

/* ================= GLITCH ================= */

.glitch{

position:fixed;
inset:0;

pointer-events:none;

background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 2px,
transparent 2px,
transparent 4px
);

mix-blend-mode:overlay;

opacity:.25;

z-index:3;

animation:glitch .15s infinite;
}

@keyframes glitch{

50%{
transform:translateX(2px);
}
}

/* ================= SHAKE ================= */

.shake{

animation:shake .15s;
}

@keyframes shake{

25%{
transform:translate(-8px,4px);
}

50%{
transform:translate(8px,-4px);
}

75%{
transform:translate(-4px,-6px);
}
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.logo{
font-size:42px;
}

.jumpBtn{
width:84px;
height:84px;
font-size:24px;
}

.eye{
width:100px;
height:100px;
}

.warning{
font-size:42px;
}

.progressBox{
width:180px;
}
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="glitch"></div>

<!-- ================= MENU ================= -->

<div class="menu"
id="menu">

<div class="logo">
GEOMETRIDESH
</div>

<div class="buttons">

<button class="btn"
onclick="startGame()">
▶ ИГРАТЬ
</button>

<button class="btn"
onclick="alert('SPACE / TAP / CLICK = ПРЫЖОК')">
❓ КАК ИГРАТЬ
</button>

</div>

</div>

<!-- ================= HUD ================= -->

<div class="topUI"
id="topUI">

<div class="progressBox">
<div class="progress"
id="progress"></div>
</div>

<button class="pause"
onclick="exitMenu()">
🏠
</button>

</div>

<button class="jumpBtn"
id="jumpBtn">
▲
</button>

<!-- ================= EYES ================= -->

<div class="eye"
id="eye1"
style="top:6%;left:6%;">

<div class="pupil"></div>

</div>

<div class="eye"
id="eye2"
style="top:12%;right:8%;">

<div class="pupil"></div>

</div>

<div class="eye"
id="eye3"
style="bottom:12%;left:10%;">

<div class="pupil"></div>

</div>

<div class="eye"
id="eye4"
style="bottom:8%;right:12%;">

<div class="pupil"></div>

</div>

<div class="flash"
id="flash"></div>

<div class="warning"
id="warning">
RUN
</div>

<script>

/* =========================================================
CANVAS
========================================================= */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width = innerWidth;
canvas.height = innerHeight;
}

resize();

addEventListener("resize",resize);

/* =========================================================
AUDIO
========================================================= */

const audioCtx =
new(window.AudioContext||
window.webkitAudioContext)();

function bass(freq,time,type="sawtooth",volume=.05){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value = freq;
osc.type = type;

gain.gain.value = volume;

osc.start();

osc.stop(audioCtx.currentTime + time);
}

let musicLoop;

function startMusic(){

clearInterval(musicLoop);

musicLoop = setInterval(()=>{

bass(40,.25,"square",.08);

setTimeout(()=>{
bass(30,.2,"sawtooth",.09);
},120);

setTimeout(()=>{
bass(80,.15,"triangle",.04);
},240);

},500);
}

/* =========================================================
GAME
========================================================= */

let gameStarted = false;

let cameraX = 0;

let speed = 5.5;

let levelLength = 17000;

const player = {

x:180,
y:0,

size:52,

velY:0,

gravity:.72,

jump:-18,

rotation:0,

grounded:false
};

const spikes = [];
const fakeSpikes = [];
const movingSpikes = [];
const blocks = [];

function groundY(){

return canvas.height - 170;
}

/* =========================================================
LEVEL
========================================================= */

function generateLevel(){

spikes.length = 0;
fakeSpikes.length = 0;
movingSpikes.length = 0;
blocks.length = 0;

/* ===== FLOOR ===== */

blocks.push({

x:0,
y:groundY()-80,
w:2400,
h:40
});

/* ===== EASY ===== */

for(let i=0;i<10;i++){

spikes.push({

x:2600+i*320,
y:groundY()-45,
size:45
});
}

/* ===== FAKE ===== */

for(let i=0;i<12;i++){

fakeSpikes.push({

x:6200+i*220,
y:groundY()-45,
size:45
});
}

/* ===== MOVING ===== */

for(let i=0;i<14;i++){

movingSpikes.push({

x:8600+i*240,
baseY:groundY()-45,
size:55,
offset:Math.random()*1000
});
}

/* ===== STAIRS ===== */

for(let i=0;i<12;i++){

blocks.push({

x:11200+i*240,

y:groundY()-120-(i%2)*120,

w:180,
h:40
});
}

/* ===== DEMON ===== */

for(let i=0;i<32;i++){

const top =
i%2===0;

spikes.push({

x:13800+i*120,

y:top
? groundY()-330
: groundY()-45,

size:65
});
}
}

/* =========================================================
START
========================================================= */

function startGame(){

cameraX = 0;

player.y =
groundY()-50;

player.velY = 0;

player.rotation = 0;

gameStarted = true;

document.getElementById("menu")
.style.display="none";

document.getElementById("topUI")
.style.display="flex";

document.getElementById("jumpBtn")
.style.display="block";

generateLevel();

startMusic();
}

/* =========================================================
EXIT
========================================================= */

function exitMenu(){

gameStarted = false;

document.getElementById("menu")
.style.display="flex";

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";
}

/* =========================================================
INPUT
========================================================= */

function jump(){

if(!gameStarted) return;

if(player.grounded){

player.velY =
player.jump;

player.grounded = false;

bass(120,.05);
}
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
jump();
}

if(e.code==="Escape"){
exitMenu();
}
});

document.addEventListener("mousedown",jump);

document.addEventListener("touchstart",jump);

document.getElementById("jumpBtn")
.addEventListener("touchstart",(e)=>{

e.preventDefault();

jump();
});

/* =========================================================
EFFECTS
========================================================= */

function flash(){

const f =
document.getElementById(
"flash"
);

f.style.opacity = .7;

setTimeout(()=>{

f.style.opacity = 0;

},80);
}

function warning(){

const w =
document.getElementById(
"warning"
);

w.style.opacity = 1;

setTimeout(()=>{

w.style.opacity = 0;

},700);
}

function shake(){

document.body.classList.add(
"shake"
);

setTimeout(()=>{

document.body.classList.remove(
"shake"
);

},150);
}

/* =========================================================
EYES
========================================================= */

let mouseX = innerWidth/2;
let mouseY = innerHeight/2;

document.addEventListener("mousemove",e=>{

mouseX = e.clientX;
mouseY = e.clientY;
});

document.addEventListener("touchmove",e=>{

mouseX =
e.touches[0].clientX;

mouseY =
e.touches[0].clientY;
});

function updateEyes(){

document.querySelectorAll(".eye")
.forEach(eye=>{

const pupil =
eye.querySelector(".pupil");

const rect =
eye.getBoundingClientRect();

const cx =
rect.left + rect.width/2;

const cy =
rect.top + rect.height/2;

const angle =
Math.atan2(
mouseY-cy,
mouseX-cx
);

const distance = 22;

const px =
Math.cos(angle)*distance;

const py =
Math.sin(angle)*distance;

pupil.style.transform =
`translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;

});
}

/* =========================================================
DRAW
========================================================= */

function drawBackground(){

const grad =
ctx.createLinearGradient(
0,0,0,canvas.height
);

grad.addColorStop(0,"#2d0000");
grad.addColorStop(.5,"#120000");
grad.addColorStop(1,"#000");

ctx.fillStyle = grad;

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

for(let i=0;i<120;i++){

ctx.fillStyle =
"rgba(255,0,0,.22)";

ctx.fillRect(
(i*180-cameraX*.25)%20000,
80+(i%12)*55,
2,
2
);
}
}

function drawGround(){

ctx.fillStyle="#180000";

ctx.fillRect(
0,
groundY(),
canvas.width,
400
);
}

function drawPlayer(){

ctx.save();

ctx.translate(
player.x,
player.y
);

ctx.rotate(player.rotation);

ctx.shadowBlur = 30;
ctx.shadowColor = "red";

ctx.fillStyle = "#ff4444";

ctx.fillRect(
-player.size/2,
-player.size/2,
player.size,
player.size
);

ctx.restore();
}

function drawBlocks(){

blocks.forEach(b=>{

const x = b.x - cameraX;

ctx.fillStyle = "#a00000";

ctx.shadowBlur = 20;
ctx.shadowColor = "red";

ctx.fillRect(
x,
b.y,
b.w,
b.h
);
});
}

function drawSpike(x,y,size,color="#ff2222"){

ctx.beginPath();

ctx.moveTo(
x,
y+size
);

ctx.lineTo(
x+size/2,
y
);

ctx.lineTo(
x+size,
y+size
);

ctx.closePath();

ctx.fillStyle = color;

ctx.shadowBlur = 25;
ctx.shadowColor = color;

ctx.fill();
}

function drawSpikes(){

spikes.forEach(s=>{

drawSpike(
s.x-cameraX,
s.y,
s.size
);
});

fakeSpikes.forEach(s=>{

drawSpike(
s.x-cameraX,
s.y,
s.size,
"rgba(255,80,80,.35)"
);
});

movingSpikes.forEach(s=>{

const moveY =
Math.sin(
(Date.now()+s.offset)
*.005
)*120;

drawSpike(
s.x-cameraX,
s.baseY+moveY,
s.size
);
});
}

/* =========================================================
UPDATE
========================================================= */

function update(){

if(!gameStarted) return;

cameraX += speed;

/* ===== SPEED ===== */

if(cameraX > 10000){

speed = 7;
}

/* ===== PHYSICS ===== */

player.velY +=
player.gravity;

player.y +=
player.velY;

player.grounded = false;

/* ===== GROUND ===== */

if(
player.y >=
groundY()-player.size/2
){

player.y =
groundY()-player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}

/* ===== BLOCKS ===== */

blocks.forEach(b=>{

const bx = b.x - cameraX;

if(
player.x + player.size/2 > bx &&
player.x - player.size/2 < bx+b.w &&
player.y + player.size/2 > b.y &&
player.y + player.size/2 < b.y+30 &&
player.velY >= 0
){

player.y =
b.y-player.size/2;

player.velY = 0;

player.grounded = true;
}
});

/* ===== ROTATION ===== */

if(!player.grounded){

player.rotation += .08;
}

/* ===== SPIKES ===== */

spikes.forEach(s=>{

const x = s.x - cameraX;

if(
player.x + player.size/2 > x+5 &&
player.x - player.size/2 < x+s.size-5 &&
player.y + player.size/2 > s.y+10 &&
player.y - player.size/2 < s.y+s.size
){

flash();

shake();

warning();

bass(22,.4,"sawtooth",.12);

startGame();
}
});

/* ===== MOVING ===== */

movingSpikes.forEach(s=>{

const x = s.x - cameraX;

const moveY =
Math.sin(
(Date.now()+s.offset)
*.005
)*120;

const sy =
s.baseY+moveY;

if(
player.x + player.size/2 > x+5 &&
player.x - player.size/2 < x+s.size-5 &&
player.y + player.size/2 > sy+10 &&
player.y - player.size/2 < sy+s.size
){

flash();

shake();

warning();

startGame();
}
});

/* ===== RANDOM ===== */

if(Math.random()<.002){

flash();
}

if(Math.random()<.0015){

warning();
}

/* ===== PROGRESS ===== */

document.getElementById(
"progress"
).style.width =

(cameraX/levelLength)*100
+ "%";

/* ===== WIN ===== */

if(cameraX >= levelLength){

warning();

exitMenu();
}
}

/* =========================================================
LOOP
========================================================= */

function loop(){

drawBackground();

drawGround();

update();

drawBlocks();

drawSpikes();

drawPlayer();

updateEyes();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
