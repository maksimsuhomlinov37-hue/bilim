<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BilimClass</title>

  <!-- CSS -->
  <link rel="stylesheet" href="Bilim.css"/>

  <!-- Шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Фон -->
  <div class="gradient-bg"></div>

  <div class="blur-circle circle-1"></div>
  <div class="blur-circle circle-2"></div>
  <div class="blur-circle circle-3"></div>

  <!-- Контейнер -->
  <main class="app">

    <!-- LOGIN -->
    <section class="glass login-screen" id="loginScreen">

      <div class="logo-box">

        <div class="logo-icon">
          B
        </div>

        <h1>
          <span class="green">Bilim</span>
          <span class="dark">Class</span>
        </h1>

        <p>
          Современная образовательная платформа
        </p>

      </div>

      <!-- Поля -->
      <div class="form">

        <div class="input-box">
          <label>Логин</label>

          <input
            type="text"
            id="loginInput"
            placeholder="Введите логин"
          >
        </div>

        <div class="input-box">
          <label>Пароль</label>

          <input
            type="password"
            id="passwordInput"
            placeholder="Введите пароль"
          >
        </div>

        <!-- Кнопка -->
        <button id="loginBtn" class="login-btn">
          Войти →
        </button>

      </div>

    </section>

    <!-- DASHBOARD -->
    <section class="dashboard hidden" id="dashboard">

      <!-- Верх -->
      <header class="topbar glass">

        <div>
          <h2>
            Добро пожаловать 👋
          </h2>

          <p id="usernameText">
            Пользователь
          </p>
        </div>

        <button id="logoutBtn" class="logout-btn">
          Выйти
        </button>

      </header>

      <!-- Карточки -->
      <div class="cards">

        <div class="card glass">
          <div class="card-icon">
            📚
          </div>

          <h3>Предметы</h3>

          <p>
            Математика, История, Физика
          </p>
        </div>

        <div class="card glass">
          <div class="card-icon">
            📝
          </div>

          <h3>Домашнее задание</h3>

          <p>
            3 активных задания
          </p>
        </div>

        <div class="card glass">
          <div class="card-icon">
            ⭐
          </div>

          <h3>Успеваемость</h3>

          <p>
            Средний балл: 4.9
          </p>
        </div>

        <div class="card glass">
          <div class="card-icon">
            ⏰
          </div>

          <h3>Расписание</h3>

          <p>
            Сегодня 5 уроков
          </p>
        </div>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="Bilim.js"></script>

</body>
</html>
