<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>GEOMETRIDESH HORROR</title>

<style>

/* =========================================================
GEOMETRIDESH HORROR 😈
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
touch-action:none;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* ================= MENU ================= */

.menu{
position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at top,
#290000 0%,
#0d0000 50%,
#000 100%);

z-index:20;
}

.logo{
font-size:72px;
font-weight:900;

color:white;

letter-spacing:5px;

text-shadow:
0 0 25px red,
0 0 60px crimson;

animation:logoPulse 2s infinite;
}

@keyframes logoPulse{

50%{
transform:scale(1.03);
}
}

.buttons{
margin-top:40px;

display:flex;
flex-direction:column;

gap:18px;

width:min(340px,90%);
}

.btn{
padding:20px;

border:none;
border-radius:24px;

font-size:22px;
font-weight:900;

color:white;

cursor:pointer;

background:
linear-gradient(135deg,
rgba(255,0,0,.22),
rgba(255,255,255,.05));

border:1px solid rgba(255,255,255,.1);

backdrop-filter:blur(10px);

box-shadow:
0 0 35px rgba(255,0,0,.25);

transition:.2s;
}

.btn:hover{
transform:translateY(-5px);
}

.btn:active{
transform:scale(.95);
}

/* ================= HUD ================= */

.topUI{
position:fixed;
top:0;
left:0;

width:100%;

padding:14px;

display:none;
justify-content:space-between;
align-items:center;

z-index:10;
}

.progressBox{
width:260px;
height:22px;

border-radius:999px;
overflow:hidden;

background:rgba(255,255,255,.08);
}

.progress{
height:100%;
width:0%;

background:
linear-gradient(90deg,
#ff2222,
orange);

box-shadow:
0 0 30px red;
}

.pause{
padding:12px 18px;

border:none;
border-radius:16px;

font-size:18px;
font-weight:900;

color:white;

background:
linear-gradient(135deg,
#8a0000,
#ff2222);
}

/* ================= JUMP ================= */

.jumpBtn{
position:fixed;

right:20px;
bottom:20px;

width:100px;
height:100px;

display:none;

border:none;
border-radius:50%;

font-size:28px;
font-weight:900;

color:white;

background:
radial-gradient(circle at top left,
#ff5555,
#650000);

box-shadow:
0 0 45px rgba(255,0,0,.85);

z-index:15;
}

/* ================= EYES ================= */

.eye{
position:fixed;

width:140px;
height:140px;

border-radius:50%;

background:
radial-gradient(circle,
#ff0000 0%,
#5c0000 40%,
transparent 70%);

box-shadow:
0 0 50px red;

z-index:5;

pointer-events:none;

transition:
transform .2s linear,
left .2s linear,
top .2s linear;
}

.eyePupil{
position:absolute;

width:38px;
height:38px;

border-radius:50%;

background:black;

top:50%;
left:50%;

transform:
translate(-50%,-50%);
}

/* ================= SCREAMER ================= */

.screamer{
position:fixed;
inset:0;

display:none;

justify-content:center;
align-items:center;

background:
rgba(0,0,0,.92);

z-index:999;

animation:flash .1s infinite;
}

.screamerFace{
font-size:240px;

filter:
drop-shadow(0 0 45px red);

animation:shake .08s infinite;
}

@keyframes flash{

50%{
background:
rgba(120,0,0,.95);
}
}

@keyframes shake{

50%{
transform:
translate(12px,-8px)
rotate(4deg)
scale(1.05);
}
}

/* ================= MEME ================= */

.meme{
position:fixed;

top:20px;
right:20px;

font-size:80px;

z-index:6;

animation:memeDance 2s infinite;
}

@keyframes memeDance{

25%{
transform:
rotate(10deg)
scale(1.1);
}

50%{
transform:
translateY(-10px)
rotate(-10deg);
}

75%{
transform:
scale(.95);
}
}

/* ================= WARNING ================= */

.warning{
position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

font-size:80px;
font-weight:900;

color:red;

opacity:0;

pointer-events:none;

z-index:50;

text-shadow:
0 0 30px red;

transition:.3s;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.logo{
font-size:42px;
}

.jumpBtn{
width:82px;
height:82px;
font-size:22px;
}

.eye{
width:90px;
height:90px;
}

.screamerFace{
font-size:150px;
}

.warning{
font-size:42px;
}
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- ================= MENU ================= -->

<div class="menu"
id="menu">

<div class="logo">
GEOMETRIDESH
</div>

<div class="buttons">

<button class="btn"
onclick="startGame()">
▶ ИГРАТЬ
</button>

<button class="btn"
onclick="alert('SPACE / КЛИК / ▲ = ПРЫЖОК')">
❓ КАК ИГРАТЬ
</button>

</div>

</div>

<!-- ================= HUD ================= -->

<div class="topUI"
id="topUI">

<div class="progressBox">
<div class="progress"
id="progress"></div>
</div>

<button class="pause"
onclick="exitMenu()">
🏠
</button>

</div>

<button class="jumpBtn"
id="jumpBtn">
▲
</button>

<!-- ================= EYES ================= -->

<div class="eye"
id="eye1"
style="top:10%;left:10%;">

<div class="eyePupil"></div>

</div>

<div class="eye"
id="eye2"
style="top:15%;right:10%;">

<div class="eyePupil"></div>

</div>

<div class="eye"
id="eye3"
style="bottom:12%;left:14%;">

<div class="eyePupil"></div>

</div>

<div class="eye"
id="eye4"
style="bottom:10%;right:14%;">

<div class="eyePupil"></div>

</div>

<!-- ================= SCREAMER ================= -->

<div class="screamer"
id="screamer">

<div class="screamerFace"
id="screamerFace">
💀
</div>

</div>

<!-- ================= MEME ================= -->

<div class="meme"
id="meme">
😼
</div>

<!-- ================= WARNING ================= -->

<div class="warning"
id="warning">
RUN.
</div>

<script>

/* =========================================================
ENGINE
========================================================= */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width = innerWidth;
canvas.height = innerHeight;
}

resize();

addEventListener("resize",resize);

/* ================= AUDIO ================= */

const audioCtx =
new(window.AudioContext||
window.webkitAudioContext)();

function bass(freq,time,type="sawtooth",volume=.05){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value = freq;
osc.type = type;

gain.gain.value = volume;

osc.start();

osc.stop(audioCtx.currentTime + time);
}

/* ================= MUSIC ================= */

let bassLoop;

function startMusic(){

clearInterval(bassLoop);

bassLoop = setInterval(()=>{

bass(42,.25,"square",.07);

setTimeout(()=>{
bass(32,.22,"sawtooth",.09);
},120);

setTimeout(()=>{
bass(88,.16,"triangle",.05);
},260);

},500);
}

function stopMusic(){

clearInterval(bassLoop);
}

/* ================= DATA ================= */

let gameStarted = false;

let cameraX = 0;
let levelLength = 9000;

let speed = 5;

const player = {

x:180,
y:0,

size:52,

velY:0,

rotation:0,

gravity:.7,

jump:-18,

grounded:false
};

const spikes = [];
const blocks = [];

function groundY(){

return canvas.height - 170;
}

/* ================= LEVEL ================= */

function generateLevel(){

spikes.length = 0;
blocks.length = 0;

/* ===== START ===== */

blocks.push({
x:0,
y:groundY()-80,
w:1200,
h:40
});

/* ===== SPIKES ===== */

for(let i=0;i<8;i++){

spikes.push({

x:1500+i*300,
y:groundY()-45,
size:45
});
}

/* ===== STAIRS ===== */

blocks.push({
x:4200,
y:groundY()-140,
w:180,
h:40
});

blocks.push({
x:4460,
y:groundY()-220,
w:180,
h:40
});

blocks.push({
x:4720,
y:groundY()-300,
w:180,
h:40
});

/* ===== DEMON PART ===== */

for(let i=0;i<12;i++){

const up =
i % 2 === 0;

spikes.push({

x:5600+i*180,

y:up
? groundY()-320
: groundY()-45,

size:60
});
}

levelLength = 8600;
}

/* ================= START ================= */

function startGame(){

cameraX = 0;

player.y =
groundY()-50;

player.velY = 0;

player.rotation = 0;

gameStarted = true;

document.getElementById("menu")
.style.display="none";

document.getElementById("topUI")
.style.display="flex";

document.getElementById("jumpBtn")
.style.display="block";

generateLevel();

startMusic();
}

/* ================= MENU ================= */

function exitMenu(){

gameStarted = false;

stopMusic();

document.getElementById("menu")
.style.display="flex";

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";
}

/* ================= INPUT ================= */

function jump(){

if(!gameStarted) return;

if(player.grounded){

player.velY =
player.jump;

player.grounded = false;

bass(120,.06);
}
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
jump();
}

if(e.code==="Escape"){
exitMenu();
}
});

document.addEventListener("mousedown",jump);
document.addEventListener("touchstart",jump);

document.getElementById("jumpBtn")
.addEventListener("touchstart",(e)=>{

e.preventDefault();

jump();
});

/* ================= SCREAMER ================= */

const screamerFaces = [

"💀",
"👹",
"😈",
"👁",
"☠",
"🤯"

];

function triggerScreamer(){

const s =
document.getElementById(
"screamer"
);

document.getElementById(
"screamerFace"
).innerHTML =

screamerFaces[
Math.floor(
Math.random()*screamerFaces.length
)];

s.style.display="flex";

bass(25,.5,"sawtooth",.12);

setTimeout(()=>{

s.style.display="none";

},280);
}

/* ================= WARNING ================= */

function showWarning(){

const w =
document.getElementById(
"warning"
);

w.style.opacity = 1;

setTimeout(()=>{

w.style.opacity = 0;

},900);
}

/* ================= MEMES ================= */

const memes = [

"😼",
"🗿",
"💀",
"🔥",
"😂",
"👁",
"🤯"

];

setInterval(()=>{

document.getElementById(
"meme"
).innerHTML =

memes[
Math.floor(
Math.random()*memes.length
)];

},2000);

/* ================= EYES ================= */

function updateEyes(){

const eyes =
document.querySelectorAll(".eye");

eyes.forEach((eye,index)=>{

const offset =
Math.sin(Date.now()*.001+index)*20;

eye.style.transform =
`translateY(${offset}px)`;

});
}

/* ================= DRAW ================= */

function drawBackground(){

const grad =
ctx.createLinearGradient(
0,0,0,canvas.height
);

grad.addColorStop(0,"#2d0000");
grad.addColorStop(.5,"#120000");
grad.addColorStop(1,"#000");

ctx.fillStyle = grad;

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

/* particles */

for(let i=0;i<100;i++){

ctx.fillStyle =
"rgba(255,0,0,.25)";

ctx.fillRect(
(i*180-cameraX*.2)%16000,
80+(i%12)*55,
2,
2
);
}
}

function drawGround(){

ctx.fillStyle="#170000";

ctx.fillRect(
0,
groundY(),
canvas.width,
400
);
}

function drawPlayer(){

ctx.save();

ctx.translate(
player.x,
player.y
);

ctx.rotate(player.rotation);

ctx.shadowBlur = 30;
ctx.shadowColor = "red";

const g =
ctx.createLinearGradient(
-40,-40,
40,40
);

g.addColorStop(0,"#ff6666");
g.addColorStop(1,"#880000");

ctx.fillStyle = g;

ctx.fillRect(
-player.size/2,
-player.size/2,
player.size,
player.size
);

ctx.restore();
}

function drawBlocks(){

blocks.forEach(b=>{

const x = b.x - cameraX;

ctx.shadowBlur = 20;
ctx.shadowColor = "red";

ctx.fillStyle = "#aa0000";

ctx.fillRect(
x,
b.y,
b.w,
b.h
);
});
}

function drawSpikes(){

spikes.forEach(s=>{

const x = s.x - cameraX;

ctx.beginPath();

ctx.moveTo(
x,
s.y+s.size
);

ctx.lineTo(
x+s.size/2,
s.y
);

ctx.lineTo(
x+s.size,
s.y+s.size
);

ctx.closePath();

ctx.shadowBlur = 25;
ctx.shadowColor = "red";

ctx.fillStyle = "#ff2222";

ctx.fill();
});
}

/* ================= UPDATE ================= */

function update(){

if(!gameStarted) return;

/* ===== SPEED ===== */

cameraX += speed;

/* ===== PHYSICS ===== */

player.velY +=
player.gravity;

player.y +=
player.velY;

player.grounded = false;

/* ===== GROUND ===== */

if(
player.y >=
groundY()-player.size/2
){

player.y =
groundY()-player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}

/* ===== BLOCKS ===== */

blocks.forEach(b=>{

const bx = b.x - cameraX;

if(
player.x + player.size/2 > bx &&
player.x - player.size/2 < bx+b.w &&
player.y + player.size/2 > b.y &&
player.y + player.size/2 < b.y+30 &&
player.velY >= 0
){

player.y =
b.y - player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}
});

/* ===== ROTATION ===== */

if(!player.grounded){

player.rotation += .08;
}

/* ===== SPIKES ===== */

spikes.forEach(s=>{

const x = s.x - cameraX;

if(
player.x + player.size/2 > x+5 &&
player.x - player.size/2 < x+s.size-5 &&
player.y + player.size/2 > s.y+10 &&
player.y - player.size/2 < s.y+s.size
){

triggerScreamer();

startGame();
}
});

/* ===== RANDOM HORROR ===== */

if(Math.random() < .003){

triggerScreamer();
}

if(Math.random() < .002){

showWarning();
}

/* ===== PROGRESS ===== */

const progress =
Math.min(
(cameraX/levelLength)*100,
100
);

document.getElementById("progress")
.style.width =
progress + "%";

/* ===== WIN ===== */

if(cameraX >= levelLength){

showWarning();

exitMenu();
}
}

/* ================= LOOP ================= */

function loop(){

drawBackground();

drawGround();

update();

drawBlocks();

drawSpikes();

drawPlayer();

updateEyes();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
