
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Menu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(
    135deg,
    #ff5f6d,
    #ffc371,
    #42e695,
    #3bb2ff,
    #8e54e9);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.menu-container{
    position:fixed;
    top:25px;
    left:25px;
    z-index:100;
}

.glass-menu{
    width:72px;
    height:72px;
    border-radius:999px;

    backdrop-filter:blur(35px) saturate(180%);
    -webkit-backdrop-filter:blur(35px) saturate(180%);

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,.35),
    rgba(255,255,255,.08));

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
    0 8px 32px rgba(0,0,0,.12),
    inset 0 1px 1px rgba(255,255,255,.6),
    inset 0 -4px 8px rgba(255,255,255,.08);

    cursor:pointer;

    transition:
    width .7s cubic-bezier(.2,1,.2,1),
    height .7s cubic-bezier(.2,1,.2,1),
    border-radius .7s cubic-bezier(.2,1,.2,1),
    transform .4s ease;

    overflow:hidden;
}

.glass-menu::before{
    content:'';
    position:absolute;
    inset:0;

    background:
    linear-gradient(
    120deg,
    rgba(255,255,255,.45),
    transparent 30%,
    transparent 70%,
    rgba(255,255,255,.15));

    mix-blend-mode:screen;
    pointer-events:none;
}

.glass-menu::after{
    content:'';
    position:absolute;
    width:180%;
    height:180%;
    top:-40%;
    left:-40%;

    background:
    radial-gradient(
    circle,
    rgba(255,255,255,.35),
    transparent 60%);

    animation:refraction 8s linear infinite;
}

@keyframes refraction{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.glass-menu.active{
    width:320px;
    height:520px;
    border-radius:34px;
}

.burger{
    position:absolute;
    top:24px;
    left:24px;
    width:24px;
    height:20px;
}

.burger span{
    display:block;
    width:100%;
    height:2px;
    background:white;
    margin:5px 0;
    border-radius:10px;
    transition:.4s;
}

.glass-menu.active .burger span:nth-child(1){
    transform:translateY(7px) rotate(45deg);
}

.glass-menu.active .burger span:nth-child(2){
    opacity:0;
}

.glass-menu.active .burger span:nth-child(3){
    transform:translateY(-7px) rotate(-45deg);
}

.menu-content{
    opacity:0;
    padding:100px 30px;
    transition:.4s;
}

.glass-menu.active .menu-content{
    opacity:1;
    transition-delay:.3s;
}

.menu-item{
    color:white;
    font-size:22px;
    margin-bottom:24px;
    padding:16px;
    border-radius:18px;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    transition:.3s;
}

.menu-item:hover{
    transform:translateX(8px);
    background:rgba(255,255,255,.18);
}

.title{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:4rem;
    font-weight:700;
    text-shadow:0 10px 30px rgba(0,0,0,.15);
}

</style>
</head>
<body>

<div class="menu-container">

    <div class="glass-menu" id="menu">

        <div class="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="menu-content">
            <div class="menu-item">Главная</div>
            <div class="menu-item">Профиль</div>
            <div class="menu-item">Проекты</div>
            <div class="menu-item">Галерея</div>
            <div class="menu-item">Настройки</div>
        </div>

    </div>

</div>

<div class="title">
    Liquid Glass
</div>

<script>

const menu = document.getElementById('menu');

menu.addEventListener('click',()=>{
    menu.classList.toggle('active');
});

</script>

</body>
</html>
