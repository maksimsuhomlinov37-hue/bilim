<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>GEOMETRIDESH ULTRA</title>

<style>
/* =======================================================
GEOMETRIDESH ULTRA
Большая улучшенная версия 😎
======================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
font-family:Arial,sans-serif;
background:#050816;
touch-action:none;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* ================= MENU ================= */

.screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle at top,
#2748aa 0%,
#0a1231 45%,
#050814 100%);
z-index:20;
}

.logo{
font-size:62px;
font-weight:900;
letter-spacing:4px;
color:white;
margin-bottom:40px;

text-shadow:
0 0 25px #62d3ff,
0 0 60px #5468ff;

animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

.menuButtons{
display:flex;
flex-direction:column;
gap:18px;
width:min(340px,90%);
}

.btn{
padding:20px;
border:none;
border-radius:24px;
font-size:22px;
font-weight:900;
color:white;
cursor:pointer;

background:
linear-gradient(135deg,
rgba(255,255,255,.14),
rgba(255,255,255,.05));

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.14);

box-shadow:
0 0 30px rgba(80,140,255,.25),
inset 0 0 20px rgba(255,255,255,.05);

transition:.2s;
}

.btn:active{
transform:scale(.96);
}

/* ================= LEVELS ================= */

.levels{
display:none;
}

.levelGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
width:min(500px,92%);
}

.level{
height:120px;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-weight:900;
font-size:22px;
color:white;

background:
linear-gradient(135deg,
rgba(255,255,255,.14),
rgba(255,255,255,.06));

border:1px solid rgba(255,255,255,.14);

box-shadow:
0 0 25px rgba(90,130,255,.2);

cursor:pointer;
transition:.2s;
}

.level span{
font-size:14px;
opacity:.7;
margin-top:8px;
}

.level:active{
transform:scale(.96);
}

/* ================= UI ================= */

.topUI{
position:fixed;
top:0;
left:0;
width:100%;
padding:14px;
display:none;
justify-content:space-between;
align-items:center;
z-index:10;
}

.progressBox{
width:210px;
height:18px;
border-radius:999px;
overflow:hidden;
background:rgba(255,255,255,.1);
}

.progress{
height:100%;
width:0%;
background:
linear-gradient(90deg,
#57d8ff,
#7166ff);

box-shadow:0 0 20px #53c1ff;
}

.pauseBtn{
padding:12px 18px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:900;
color:white;

background:
linear-gradient(135deg,
#496bff,
#7d61ff);
}

/* ================= MOBILE ================= */

.jumpBtn{
position:fixed;
right:20px;
bottom:20px;
width:96px;
height:96px;
border:none;
border-radius:50%;
display:none;

font-size:24px;
font-weight:900;
color:white;

background:
radial-gradient(circle at top left,
#9be5ff,
#5466ff);

box-shadow:
0 0 35px rgba(90,160,255,.7);

z-index:12;
}

.jumpBtn:active{
transform:scale(.92);
}

/* ================= POPUP ================= */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.7);

padding:30px 45px;
border-radius:30px;

background:
linear-gradient(135deg,
rgba(255,255,255,.18),
rgba(255,255,255,.08));

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,.14);

font-size:42px;
font-weight:900;
color:white;

opacity:0;
pointer-events:none;

z-index:100;

transition:.4s;

text-align:center;

text-shadow:
0 0 20px #68c5ff;
}

.popup.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

/* ================= MOBILE ================= */

@media(max-width:700px){

.logo{
font-size:38px;
}

.levelGrid{
grid-template-columns:1fr;
}

.jumpBtn{
width:84px;
height:84px;
font-size:20px;
}

.popup{
font-size:26px;
width:90%;
}
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- ================= MENU ================= -->

<div class="screen" id="mainMenu">

<div class="logo">
GEOMETRIDESH
</div>

<div class="menuButtons">

<button class="btn"
onclick="openLevels()">
▶ ИГРАТЬ
</button>

<button class="btn"
onclick="openHowTo()">
❓ КАК ИГРАТЬ
</button>

</div>

</div>

<!-- ================= HOW TO ================= -->

<div class="screen"
id="howTo"
style="display:none;">

<div class="logo">
КАК ИГРАТЬ
</div>

<div style="
max-width:700px;
padding:20px;
text-align:center;
line-height:1.8;
color:white;
font-size:20px;
opacity:.9;
">

SPACE / КЛИК / КНОПКА ▲ = ПРЫЖОК<br><br>

Избегай шипов 🔺<br><br>

Esc = выйти в меню ⌨<br><br>

Пройди все уровни и получи достижение
🏆 НАСТОЯЩИЙ ДЕМОН 🏆

</div>

<br>

<button class="btn"
style="width:min(300px,90%);"
onclick="backMenu()">
⬅ НАЗАД
</button>

</div>

<!-- ================= LEVELS ================= -->

<div class="screen levels"
id="levels">

<div class="logo">
УРОВНИ
</div>

<div class="levelGrid">

<div class="level"
onclick="startGame(1)">
LEVEL 1
<span>EASY</span>
</div>

<div class="level"
onclick="startGame(2)">
LEVEL 2
<span>NORMAL</span>
</div>

<div class="level"
onclick="startGame(3)">
LEVEL 3
<span>HARD</span>
</div>

<div class="level"
onclick="startGame(4)">
LEVEL 4
<span>INSANE</span>
</div>

<div class="level"
onclick="startGame(5)">
LEVEL 5
<span>DEMON</span>
</div>

</div>

<br>

<button class="btn"
style="width:min(300px,90%);"
onclick="backMenu()">
⬅ НАЗАД
</button>

</div>

<!-- ================= HUD ================= -->

<div class="topUI"
id="topUI">

<div class="progressBox">
<div class="progress"
id="progress"></div>
</div>

<button class="pauseBtn"
onclick="exitToMenu()">
🏠
</button>

</div>

<button class="jumpBtn"
id="jumpBtn">
▲
</button>

<div class="popup"
id="popup">
МОЛОДЕЦ 😎
</div>

<script>
/* =======================================================
GAME ENGINE
======================================================= */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width = innerWidth;
canvas.height = innerHeight;
}

resize();

addEventListener("resize",resize);

/* ================= AUDIO ================= */

const audioCtx =
new(window.AudioContext||
window.webkitAudioContext)();

function beep(freq,time){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value = freq;
osc.type = "square";

gain.gain.value = .03;

osc.start();

osc.stop(audioCtx.currentTime + time);
}

/* ================= GAME DATA ================= */

let currentLevel = 1;
let cameraX = 0;
let gameStarted = false;

const completedLevels = new Set();

const player = {

x:170,
y:0,

size:52,

velY:0,

rotation:0,

gravity:.82,

jump:-15,

grounded:false
};

function groundY(){

return canvas.height - 170;
}

const spikes = [];
const blocks = [];
const particles = [];

let levelLength = 5000;

/* ================= PARTICLES ================= */

function createParticles(x,y,color){

for(let i=0;i<14;i++){

particles.push({

x,
y,

vx:(Math.random()-.5)*6,
vy:(Math.random()-.5)*6,

life:50,

color
});
}
}

function updateParticles(){

for(let i=particles.length-1;i>=0;i--){

const p = particles[i];

p.x += p.vx;
p.y += p.vy;

p.life--;

ctx.globalAlpha = p.life/50;

ctx.fillStyle = p.color;

ctx.fillRect(
p.x,
p.y,
6,
6
);

ctx.globalAlpha = 1;

if(p.life <= 0){

particles.splice(i,1);
}
}
}

/* ================= LEVEL GENERATOR ================= */

function generateLevel(level){

spikes.length = 0;
blocks.length = 0;

if(level === 1){

blocks.push({
x:100,
y:groundY()-80,
w:400,
h:40
});

blocks.push({
x:700,
y:groundY()-120,
w:160,
h:40
});

blocks.push({
x:930,
y:groundY()-160,
w:160,
h:40
});

spikes.push({
x:1280,
y:groundY()-45,
size:45
});

blocks.push({
x:1480,
y:groundY()-120,
w:260,
h:40
});

blocks.push({
x:1920,
y:groundY()-80,
w:300,
h:40
});

blocks.push({
x:2420,
y:groundY()-140,
w:220,
h:40
});

spikes.push({
x:2860,
y:groundY()-45,
size:45
});

blocks.push({
x:3120,
y:groundY()-120,
w:420,
h:40
});

levelLength = 3900;
}

/* ================= LEVEL 2 ================= */

if(level === 2){

blocks.push({
x:100,
y:groundY()-80,
w:360,
h:40
});

blocks.push({
x:640,
y:groundY()-140,
w:180,
h:40
});

spikes.push({
x:980,
y:groundY()-45,
size:45
});

blocks.push({
x:1180,
y:groundY()-200,
w:200,
h:40
});

blocks.push({
x:1520,
y:groundY()-120,
w:200,
h:40
});

spikes.push({
x:1860,
y:groundY()-45,
size:45
});

spikes.push({
x:1920,
y:groundY()-45,
size:45
});

blocks.push({
x:2200,
y:groundY()-220,
w:240,
h:40
});

blocks.push({
x:2600,
y:groundY()-120,
w:260,
h:40
});

levelLength = 3400;
}

/* ================= LEVEL 3+ ================= */

if(level >= 3){

let x = 200;
let h = groundY()-80;

for(let i=0;i<20;i++){

blocks.push({

x,
y:h,
w:180,
h:40
});

if(i % 2 === 0){

spikes.push({

x:x+240,
y:groundY()-45,
size:45
});
}

h +=
Math.random() > .5
? -60
: 60;

h =
Math.max(
groundY()-260,
Math.min(
groundY()-80,
h
));

x += 360;
}

levelLength = x + 600;
}
}

/* ================= START GAME ================= */

function startGame(level){

currentLevel = level;

document.getElementById("mainMenu")
.style.display="none";

document.getElementById("levels")
.style.display="none";

document.getElementById("topUI")
.style.display="flex";

document.getElementById("jumpBtn")
.style.display="block";

cameraX = 0;

player.y = groundY()-50;
player.velY = 0;
player.rotation = 0;

gameStarted = true;

generateLevel(level);

beep(450,.08);
}

/* ================= MENUS ================= */

function openLevels(){

beep(550,.05);

document.getElementById("mainMenu")
.style.display="none";

document.getElementById("levels")
.style.display="flex";
}

function openHowTo(){

document.getElementById("mainMenu")
.style.display="none";

document.getElementById("howTo")
.style.display="flex";
}

function backMenu(){

document.getElementById("levels")
.style.display="none";

document.getElementById("howTo")
.style.display="none";

document.getElementById("mainMenu")
.style.display="flex";
}

function exitToMenu(){

gameStarted = false;

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";

document.getElementById("mainMenu")
.style.display="flex";
}

/* ================= INPUT ================= */

function jump(){

if(!gameStarted) return;

if(player.grounded){

player.velY = player.jump;
player.grounded = false;

createParticles(
player.x,
player.y,
"#6ddcff"
);

beep(700,.05);
}
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
jump();
}

if(e.code==="Escape"){
exitToMenu();
}
});

document.addEventListener("mousedown",jump);
document.addEventListener("touchstart",jump);

document.getElementById("jumpBtn")
.addEventListener("touchstart",(e)=>{

e.preventDefault();

jump();
});

/* ================= POPUP ================= */

function showPopup(text){

const popup =
document.getElementById("popup");

popup.innerHTML = text;

popup.classList.add("show");

setTimeout(()=>{

popup.classList.remove("show");

},2600);
}

/* ================= DRAW ================= */

function drawBackground(){

const grad =
ctx.createLinearGradient(
0,0,0,canvas.height);

grad.addColorStop(0,"#1b357a");
grad.addColorStop(.5,"#0b1638");
grad.addColorStop(1,"#050814");

ctx.fillStyle = grad;

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

for(let i=0;i<45;i++){

let x =
((i*350)-cameraX*.2)%16000;

ctx.fillStyle =
"rgba(120,170,255,.08)";

ctx.fillRect(
x,
100,
120,
600
);
}
}

function drawGround(){

ctx.fillStyle="#091126";

ctx.fillRect(
0,
groundY(),
canvas.width,
400
);
}

function drawPlayer(){

ctx.save();

ctx.translate(
player.x,
player.y
);

ctx.rotate(player.rotation);

ctx.shadowBlur = 25;
ctx.shadowColor = "#62c8ff";

const g =
ctx.createLinearGradient(
-40,-40,
40,40
);

g.addColorStop(0,"#6cf1ff");
g.addColorStop(1,"#6865ff");

ctx.fillStyle = g;

ctx.fillRect(
-player.size/2,
-player.size/2,
player.size,
player.size
);

ctx.restore();
}

function drawBlocks(){

blocks.forEach(b=>{

const x = b.x - cameraX;

ctx.shadowBlur = 18;
ctx.shadowColor = "#55a8ff";

const g =
ctx.createLinearGradient(
x,b.y,
x,b.y+b.h
);

g.addColorStop(0,"#69d6ff");
g.addColorStop(1,"#4364ff");

ctx.fillStyle = g;

ctx.fillRect(
x,
b.y,
b.w,
b.h
);
});
}

function drawSpikes(){

spikes.forEach(s=>{

const x = s.x - cameraX;

ctx.beginPath();

ctx.moveTo(
x,
s.y+s.size
);

ctx.lineTo(
x+s.size/2,
s.y
);

ctx.lineTo(
x+s.size,
s.y+s.size
);

ctx.closePath();

ctx.shadowBlur = 20;
ctx.shadowColor = "#ff4673";

const g =
ctx.createLinearGradient(
x,s.y,
x,s.y+s.size
);

g.addColorStop(0,"#ff8eb1");
g.addColorStop(1,"#ff3d6d");

ctx.fillStyle = g;

ctx.fill();
});
}

/* ================= UPDATE ================= */

function update(){

if(!gameStarted) return;

cameraX +=
3.4 + currentLevel*.55;

player.velY += player.gravity;

player.y += player.velY;

player.grounded = false;

/* ===== GROUND ===== */

if(
player.y >=
groundY()-player.size/2
){

player.y =
groundY()-player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}

/* ===== BLOCK COLLISION ===== */

blocks.forEach(b=>{

const bx = b.x - cameraX;

if(
player.x + player.size/2 > bx &&
player.x - player.size/2 < bx+b.w &&
player.y + player.size/2 > b.y &&
player.y + player.size/2 < b.y+25 &&
player.velY >= 0
){

player.y =
b.y - player.size/2;

player.velY = 0;

player.rotation = 0;

player.grounded = true;
}
});

/* ===== ROTATION ===== */

if(!player.grounded){

player.rotation += .08;
}

/* ===== SPIKES ===== */

spikes.forEach(s=>{

const x = s.x - cameraX;

if(
player.x + player.size/2 > x &&
player.x - player.size/2 < x+s.size &&
player.y + player.size/2 > s.y
){

createParticles(
player.x,
player.y,
"#ff4f7f"
);

beep(120,.15);

startGame(currentLevel);
}
});

/* ===== WIN ===== */

if(cameraX >= levelLength){

gameStarted = false;

completedLevels.add(currentLevel);

document.getElementById("topUI")
.style.display="none";

document.getElementById("jumpBtn")
.style.display="none";

document.getElementById("levels")
.style.display="flex";

if(currentLevel === 1){
showPopup("МОЛОДЕЦ 😎");
}

if(currentLevel === 2){
showPopup("ХОРОШ 🔥");
}

if(currentLevel === 3){
showPopup("МАШИНА ⚡");
}

if(currentLevel === 4){
showPopup("БЕЗУМИЕ 👹");
}

if(currentLevel === 5){
showPopup("🏆 ДЕМОН 🏆");
}

if(completedLevels.size === 5){

setTimeout(()=>{

showPopup(
"👑 НАСТОЯЩИЙ ДЕМОН 👑"
);

},1200);
}

beep(900,.2);
}

/* ===== PROGRESS ===== */

const progress =
Math.min(
(cameraX/levelLength)*100,
100
);

document.getElementById("progress")
.style.width =
progress + "%";
}

/* ================= LOOP ================= */

function loop(){

drawBackground();

drawGround();

update();

drawBlocks();

drawSpikes();

drawPlayer();

updateParticles();

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
