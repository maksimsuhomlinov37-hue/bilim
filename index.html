<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
overflow-x:hidden;
background:#050505;
min-height:100vh;
}

/* Живой фон */

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#ff4d6d55,transparent 35%),
radial-gradient(circle at 80% 30%,#4d9fff55,transparent 35%),
radial-gradient(circle at 50% 90%,#00ffb355,transparent 35%);
animation:bgMove 15s infinite alternate ease-in-out;
filter:blur(80px);
z-index:-3;
}

@keyframes bgMove{
0%{
transform:scale(1) rotate(0deg);
}
100%{
transform:scale(1.3) rotate(25deg);
}
}

/* Световые лучи */

.light{
position:fixed;
width:800px;
height:800px;
border-radius:50%;
background:radial-gradient(circle,#ffffff22,transparent 70%);
pointer-events:none;
transform:translate(-50%,-50%);
mix-blend-mode:screen;
filter:blur(40px);
z-index:-1;
}

/* Бургер */

.burger{
position:fixed;
top:20px;
left:20px;
width:70px;
height:70px;
border-radius:50%;
cursor:pointer;
z-index:999;
display:flex;
justify-content:center;
align-items:center;

background:rgba(255,255,255,.08);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.15);
box-shadow:
0 8px 30px rgba(255,255,255,.1),
inset 0 0 20px rgba(255,255,255,.1);
transition:.6s;
}

.burger span{
position:absolute;
width:28px;
height:2px;
background:white;
transition:.5s;
}

.burger span:nth-child(1){
transform:translateY(-8px);
}

.burger span:nth-child(3){
transform:translateY(8px);
}

.burger.active span:nth-child(1){
transform:rotate(45deg);
}

.burger.active span:nth-child(2){
opacity:0;
}

.burger.active span:nth-child(3){
transform:rotate(-45deg);
}

/* Меню */

.sidebar{
position:fixed;
top:0;
left:0;
width:0;
height:100%;
overflow:hidden;

background:rgba(255,255,255,.08);

backdrop-filter:blur(50px);
-webkit-backdrop-filter:blur(50px);

border-right:1px solid rgba(255,255,255,.15);

transition:.8s cubic-bezier(.19,1,.22,1);

display:flex;
flex-direction:column;
padding-top:120px;
z-index:998;
}

.sidebar.open{
width:320px;
}

.sidebar a{
color:white;
text-decoration:none;
font-size:24px;
padding:20px 40px;
transition:.4s;
}

.sidebar a:hover{
padding-left:60px;
color:#7df9ff;
}

/* Контент */

.section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.glass{
width:min(900px,90%);
padding:50px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.15);

border-radius:40px;

box-shadow:
0 10px 40px rgba(255,255,255,.05),
inset 0 0 40px rgba(255,255,255,.08);

color:white;

transition:.5s;
}

.glass:hover{
transform:translateY(-10px);
}

.title{
font-size:60px;
font-weight:800;
margin-bottom:20px;

background:linear-gradient(
90deg,
#fff,
#7df9ff,
#ffffff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.text{
opacity:.8;
line-height:1.8;
}

/* Кнопка */

.liquid-btn{
margin-top:40px;
position:relative;

width:280px;
height:80px;

border:none;
cursor:pointer;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border-radius:999px;

color:white;
font-size:22px;

overflow:hidden;

transition:.4s;
}

.liquid-btn::before{
content:'';
position:absolute;
width:300%;
height:300%;

background:
radial-gradient(
circle,
rgba(255,255,255,.4),
transparent 60%
);

top:-100%;
left:-100%;

animation:liquid 6s linear infinite;
}

@keyframes liquid{
0%{
transform:rotate(0deg);
}
100%{
transform:rotate(360deg);
}
}

.liquid-btn:hover{
transform:scale(1.08);
box-shadow:
0 0 50px rgba(125,249,255,.4);
}

/* Плавающие сферы */

.orb{
position:fixed;
border-radius:50%;
pointer-events:none;
filter:blur(20px);
animation:float 12s infinite ease-in-out;
}

.orb:nth-child(1){
width:200px;
height:200px;
background:#00fff250;
top:10%;
left:70%;
}

.orb:nth-child(2){
width:150px;
height:150px;
background:#ff00aa50;
bottom:10%;
left:15%;
animation-delay:3s;
}

@keyframes float{
50%{
transform:
translateY(-60px)
translateX(40px);
}
}

</style>
</head>
<body>

<div class="light" id="light"></div>

<div class="orb"></div>
<div class="orb"></div>

<div class="burger" id="burger">
<span></span>
<span></span>
<span></span>
</div>

<div class="sidebar" id="sidebar">

<a href="#home">Главная</a>
<a href="#button">Кнопка</a>

</div>

<section class="section" id="home">

<div class="glass">

<div class="title">
Liquid Glass
</div>

<div class="text">
Современный интерфейс с эффектами жидкого стекла,
матового стекла, динамических преломлений света,
живого градиента и плавных анимаций.
</div>

</div>

</section>

<section class="section" id="button">

<div class="glass">

<div class="title">
Динамичная Кнопка
</div>

<div class="text">
Кнопка демонстрирует эффект жидкого стекла,
вращающихся бликов и плавных взаимодействий.
</div>

<button class="liquid-btn">
Нажми меня
</button>

</div>

</section>

<script>

const burger=document.getElementById("burger");
const sidebar=document.getElementById("sidebar");

burger.onclick=()=>{
burger.classList.toggle("active");
sidebar.classList.toggle("open");
};

/* Свет следует за мышью */

const light=document.getElementById("light");

document.addEventListener("mousemove",(e)=>{

light.style.left=e.clientX+"px";
light.style.top=e.clientY+"px";

});

/* Параллакс */

document.addEventListener("mousemove",(e)=>{

const x=(e.clientX/window.innerWidth-.5)*20;
const y=(e.clientY/window.innerHeight-.5)*20;

document.querySelectorAll('.glass').forEach(card=>{

card.style.transform=
`rotateY(${x}deg)
 rotateX(${-y}deg)`;

});

});

</script>

</body>
</html>
